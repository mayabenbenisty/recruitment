<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת גיוס</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5F4F1;color:#1a1a1a;font-size:14px;direction:rtl}
a{color:inherit;text-decoration:none}

/* Layout */
.shell{display:flex;min-height:100vh}
.sidebar{width:200px;background:#fff;border-left:1px solid #e5e5e2;display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:10}
.main{margin-right:200px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e2;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.content{padding:24px;flex:1}

/* Sidebar */
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid #e5e5e2}
.sidebar-logo span{font-size:15px;font-weight:600;color:#1a1a1a}
.sidebar-logo small{display:block;font-size:11px;color:#888;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:#555;cursor:pointer;transition:background .15s;border-right:3px solid transparent}
.nav-item:hover{background:#f5f4f1;color:#1a1a1a}
.nav-item.active{background:#EEF2FF;color:#3730a3;border-right-color:#3730a3;font-weight:500}
.nav-icon{font-size:16px;width:18px;text-align:center}
.nav-badge{margin-right:auto;background:#3730a3;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:16px}
.stat-val{font-size:26px;font-weight:600;color:#1a1a1a;line-height:1}
.stat-lbl{font-size:12px;color:#888;margin-top:4px}
.stat-delta{font-size:11px;color:#16a34a;margin-top:6px}

/* Cards */
.card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;margin-bottom:16px}
.card-head{padding:14px 18px;border-bottom:1px solid #e5e5e2;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:18px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:right;padding:9px 14px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e5e2;background:#fafaf8}
.tbl td{padding:10px 14px;border-bottom:1px solid #f0efeb;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover td{background:#f8f7f4}

/* Pipeline */
.pipeline-wrap{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto;padding-bottom:4px}
.pipe-col{background:#fafaf8;border:1px solid #e5e5e2;border-radius:8px;padding:10px;min-width:120px}
.pipe-col-head{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e5e5e2;display:flex;justify-content:space-between;align-items:center}
.pipe-count{background:#e5e5e2;color:#555;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.pipe-card{background:#fff;border:1px solid #e5e5e2;border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s;font-size:12px}
.pipe-card:hover{border-color:#a5b4fc;box-shadow:0 1px 4px rgba(99,102,241,.12)}
.pipe-name{font-weight:500;color:#1a1a1a;margin-bottom:2px}
.pipe-job{color:#888;font-size:11px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-stage-0{background:#F1EFE8;color:#444}
.badge-stage-1{background:#EFF6FF;color:#1d4ed8}
.badge-stage-2{background:#FEF9C3;color:#854d0e}
.badge-stage-3{background:#FEF3C7;color:#92400e}
.badge-stage-4{background:#ECFDF5;color:#065f46}
.badge-stage-5{background:#F0FDF4;color:#14532d}
.badge-rejected{background:#FEF2F2;color:#991b1b}
.pipe-col-rejected{background:#FEF2F2;border-color:#fecaca}
.pipe-col-rejected .pipe-col-head{color:#991b1b;border-bottom-color:#fecaca}
.pipe-col-rejected .pipe-count{background:#fecaca;color:#991b1b}
.pipe-card-rejected{background:#fff5f5;border-color:#fecaca}
.pipe-card-rejected:hover{border-color:#f87171}
.badge-open{background:#ECFDF5;color:#065f46}
.badge-hold{background:#F1EFE8;color:#555}
.badge-closed{background:#FEF2F2;color:#991b1b}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e0dfd9;background:#fff;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f5f4f1}
.btn-primary{background:#3730a3;color:#fff;border-color:#3730a3}
.btn-primary:hover{background:#312e81}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:#f5f4f1}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-head{padding:18px 20px;border-bottom:1px solid #e5e5e2;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid #e5e5e2;display:flex;justify-content:flex-end;gap:8px}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px}
.form-label.required::after{content:" *";color:#dc2626}
input[type=text],input[type=email],input[type=date],input[type=time],select,textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #d1d0cb;border-radius:7px;background:#fff;color:#1a1a1a;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Candidate detail */
.detail-hero{padding:20px;border-bottom:1px solid #e5e5e2;display:flex;gap:14px;align-items:flex-start}
.avatar{width:48px;height:48px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#3730a3;flex-shrink:0}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e2;padding:0 20px}
.detail-tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;font-weight:500}
.detail-tab.active{color:#3730a3;border-bottom-color:#3730a3}
.detail-section{padding:18px 20px}
.detail-section-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.info-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;font-size:13px}
.info-key{color:#888;min-width:90px;flex-shrink:0}
.log-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #f0efeb;font-size:12px}
.log-item:last-child{border-bottom:none}
.log-date{color:#aaa;min-width:70px;flex-shrink:0;font-size:11px;padding-top:1px}
.log-text{color:#1a1a1a;line-height:1.5}

/* Interview card */
.interview-card{background:#fafaf8;border:1px solid #e5e5e2;border-radius:8px;padding:12px;margin-bottom:10px}
.interview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.interview-type{font-size:12px;font-weight:600;color:#3730a3}
.interview-date{font-size:12px;color:#888}
.interview-score{display:inline-flex;gap:2px;margin-bottom:6px}
.star{color:#f59e0b;font-size:14px}
.star.empty{color:#d1d0cb}
.interview-notes{font-size:12px;color:#555;line-height:1.5}
.interview-interviewer{font-size:11px;color:#aaa;margin-top:6px}

/* File upload */
.file-zone{border:2px dashed #d1d0cb;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;background:#fafaf8}
.file-zone:hover{border-color:#6366f1}
.file-zone-text{font-size:13px;color:#888;margin-top:6px}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f5f4f1;border-radius:7px;margin-bottom:6px;font-size:12px}
.file-icon{font-size:18px}
.file-name{flex:1;color:#1a1a1a}
.file-size{color:#aaa}

/* Stage selector */
.stage-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.stage-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #d1d0cb;background:#fff;color:#555;transition:all .15s}
.stage-btn.active{border-color:#3730a3;background:#EEF2FF;color:#3730a3}

/* Job card */
.job-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start}
.job-body{flex:1}
.job-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.job-meta{font-size:12px;color:#888;margin-bottom:8px}
.job-desc{font-size:12px;color:#555;line-height:1.5}
.job-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;min-width:100px}

/* Email parser */
.parsed-box{background:#F0FDF4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin-top:12px}
.parsed-field{display:flex;gap:10px;font-size:13px;margin-bottom:6px}
.parsed-key{color:#065f46;font-weight:600;min-width:80px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-text{font-size:14px}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-right:0}
  .stats-row{grid-template-columns:1fr 1fr}
  .pipeline-wrap{grid-template-columns:repeat(3,minmax(120px,1fr))}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>מערכת גיוס</span>
      <small>ניהול מועמדים</small>
    </div>
    <nav style="flex:1;padding:8px 0">
      <div class="nav-item active" data-tab="dashboard" onclick="goTab(this)"><span class="nav-icon">📊</span> דאשבורד</div>
      <div class="nav-item" data-tab="pipeline" onclick="goTab(this)"><span class="nav-icon">🔀</span> Pipeline</div>
      <div class="nav-item" data-tab="candidates" onclick="goTab(this)"><span class="nav-icon">👤</span> מועמדים</div>
      <div class="nav-item" data-tab="jobs" onclick="goTab(this)"><span class="nav-icon">💼</span> משרות</div>
      <div class="nav-item" data-tab="email" onclick="goTab(this)"><span class="nav-icon">📧</span> שאיבת קו"ח</div>
      <div class="nav-item" data-tab="reports" onclick="goTab(this)"><span class="nav-icon">📈</span> דוחות</div>
    </nav>
    <div style="padding:12px 16px;border-top:1px solid #e5e5e2;font-size:11px;color:#aaa">גרסה 1.0</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div style="font-size:15px;font-weight:600" id="pageTitle">דאשבורד</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="openModal('addCandidate')">+ מועמד חדש</button>
        <button class="btn btn-sm" onclick="openModal('addJob')">+ משרה חדשה</button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.85);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="width:40px;height:40px;border:3px solid #e5e5e2;border-top-color:#3730a3;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div style="font-size:14px;color:#555">טוענת נתונים מהענן...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ============ MODALS ============ -->

<!-- Add Candidate Modal -->
<div class="modal-backdrop" id="addCandidateModal" style="display:none" onclick="closeModalBg(event,'addCandidateModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">הוספת מועמד חדש</span>
      <button class="btn-ghost btn btn-sm" onclick="closeModal('addCandidateModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label required">שם פרטי</label><input type="text" id="c_fn"></div>
        <div class="form-group"><label class="form-label required">שם משפחה</label><input type="text" id="c_ln"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">מייל</label><input type="email" id="c_email"></div>
        <div class="form-group"><label class="form-label">טלפון</label><input type="text" id="c_phone"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label required">משרה</label><select id="c_job"></select></div>
        <div class="form-group"><label class="form-label">מקור</label>
          <select id="c_source"><option>LinkedIn</option><option>מייל ישיר</option><option>המלצה</option><option>AllJobs</option><option>JobMaster</option><option>אתר החברה</option><option>אחר</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">קורות חיים (PDF / Word)</label>
        <div class="file-zone" onclick="document.getElementById('c_cv').click()">
          <div style="font-size:24px">📎</div>
          <div class="file-zone-text">לחצי לבחירת קובץ</div>
          <input type="file" id="c_cv" accept=".pdf,.doc,.docx" style="display:none" onchange="handleCVUpload(this,'c_cv_name')">
        </div>
        <div id="c_cv_name" style="margin-top:8px"></div>
      </div>
      <div class="form-group"><label class="form-label">הערות</label><textarea id="c_notes" placeholder="רשמי הערות ראשוניות..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('addCandidateModal')">ביטול</button>
      <button class="btn btn-primary" onclick="saveCandidate()">שמור מועמד</button>
    </div>
  </div>
</div>

<!-- Candidate Detail Modal -->
<div class="modal-backdrop" id="candidateDetailModal" style="display:none" onclick="closeModalBg(event,'candidateDetailModal')">
  <div class="modal" style="max-width:680px" onclick="event.stopPropagation()">
    <div id="candidateDetailContent"></div>
  </div>
</div>

<!-- Add Interview Modal -->
<div class="modal-backdrop" id="addInterviewModal" style="display:none" onclick="closeModalBg(event,'addInterviewModal')">
  <div class="modal" style="max-width:500px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">הוספת ראיון</span>
      <button class="btn-ghost btn btn-sm" onclick="closeModal('addInterviewModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label required">תאריך</label><input type="date" id="iv_date"></div>
        <div class="form-group"><label class="form-label required">שעה</label><input type="time" id="iv_time"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">סוג ראיון</label>
          <select id="iv_type"><option>ראיון טלפוני</option><option>ראיון ראשון</option><option>ראיון מתקדם</option><option>ראיון מנהל בכיר</option><option>ראיון HR</option><option>בדיקת ממליצים</option></select>
        </div>
        <div class="form-group"><label class="form-label">מראיין/ת</label><input type="text" id="iv_interviewer" placeholder="שם המראיין"></div>
      </div>
      <div class="form-group"><label class="form-label">הערות לפני הראיון</label><textarea id="iv_prenotes" placeholder="נושאים לבדיקה, שאלות..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('addInterviewModal')">ביטול</button>
      <button class="btn btn-primary" onclick="saveInterview()">שמור ראיון</button>
    </div>
  </div>
</div>

<!-- Add Interview Summary Modal -->
<div class="modal-backdrop" id="addSummaryModal" style="display:none" onclick="closeModalBg(event,'addSummaryModal')">
  <div class="modal" style="max-width:520px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">סיכום ראיון</span>
      <button class="btn-ghost btn btn-sm" onclick="closeModal('addSummaryModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="summaryInterviewLabel" style="font-size:13px;color:#888;margin-bottom:14px"></div>
      <div class="form-group"><label class="form-label">ציון כולל</label>
        <div style="display:flex;gap:6px;margin-top:4px" id="starRating">
          <span class="star-btn" data-v="1" onclick="setStars(1)" style="font-size:22px;cursor:pointer">⭐</span>
          <span class="star-btn" data-v="2" onclick="setStars(2)" style="font-size:22px;cursor:pointer">⭐</span>
          <span class="star-btn" data-v="3" onclick="setStars(3)" style="font-size:22px;cursor:pointer">⭐</span>
          <span class="star-btn" data-v="4" onclick="setStars(4)" style="font-size:22px;cursor:pointer">⭐</span>
          <span class="star-btn" data-v="5" onclick="setStars(5)" style="font-size:22px;cursor:pointer">⭐</span>
          <span id="starVal" style="font-size:13px;color:#888;align-self:center;margin-right:6px"></span>
        </div>
      </div>
      <div class="form-group"><label class="form-label">סיכום הראיון</label><textarea id="sum_notes" style="min-height:100px" placeholder="רשמי את התרשמותך מהמועמד..."></textarea></div>
      <div class="form-group"><label class="form-label">המלצה</label>
        <select id="sum_rec"><option value="">בחר/י...</option><option value="✅ להמשיך">✅ להמשיך</option><option value="⏸ לשקול">⏸ לשקול</option><option value="❌ לא להמשיך">❌ לא להמשיך</option></select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('addSummaryModal')">ביטול</button>
      <button class="btn btn-primary" onclick="saveSummary()">שמור סיכום</button>
    </div>
  </div>
</div>

<!-- Reject Candidate Modal -->
<div class="modal-backdrop" id="rejectModal" style="display:none" onclick="closeModalBg(event,'rejectModal')">
  <div class="modal" style="max-width:460px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">סיום תהליך — <span id="rejectCandName"></span></span>
      <button class="btn-ghost btn btn-sm" onclick="closeModal('rejectModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label required">סיבת סיום התהליך</label>
        <select id="rej_reason">
          <option value="">בחר/י סיבה...</option>
          <optgroup label="יזמנו אנחנו">
            <option value="לא מתאים ע"ס קו"ח">לא מתאים ע"ס קו"ח</option>
            <option value="לא עבר סינון">לא עבר סינון</option>
            <option value="נדחה לאחר ראיון ראשון">נדחה לאחר ראיון ראשון</option>
            <option value="נדחה לאחר ראיון מתקדם">נדחה לאחר ראיון מתקדם</option>
            <option value="ציפיות שכר לא מתאימות">ציפיות שכר לא מתאימות</option>
            <option value="מועמד אחר נבחר">מועמד אחר נבחר</option>
            <option value="המשרה נסגרה">המשרה נסגרה</option>
          </optgroup>
          <optgroup label="יזם המועמד">
            <option value="המועמד הסיר מועמדות">המועמד הסיר מועמדות</option>
            <option value="המועמד הבריז / לא הגיע">המועמד הבריז / לא הגיע</option>
            <option value="המועמד קיבל הצעה אחרת">המועמד קיבל הצעה אחרת</option>
            <option value="המועמד חזר בו">המועמד חזר בו</option>
          </optgroup>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div class="form-group" id="rej_other_wrap" style="display:none">
        <label class="form-label">פרטי</label>
        <input type="text" id="rej_other" placeholder="פרטי את הסיבה...">
      </div>
      <div class="form-group">
        <label class="form-label">הערות (אופציונלי)</label>
        <textarea id="rej_notes" placeholder="הערות נוספות..."></textarea>
      </div>
      <div style="background:#FEF2F2;border:1px solid #fecaca;border-radius:8px;padding:10px;font-size:12px;color:#991b1b">
        המועמד יועבר לעמודת <strong>נדחו</strong> ב-pipeline ויישאר במערכת לצורך דוחות והיסטוריה.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('rejectModal')">ביטול</button>
      <button class="btn btn-danger" onclick="saveRejection()">סיים תהליך</button>
    </div>
  </div>
</div>

<!-- Add Job Modal -->
<div class="modal-backdrop" id="addJobModal" style="display:none" onclick="closeModalBg(event,'addJobModal')">
  <div class="modal" style="max-width:480px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">הוספת משרה חדשה</span>
      <button class="btn-ghost btn btn-sm" onclick="closeModal('addJobModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label required">כותרת המשרה</label><input type="text" id="j_title" placeholder="מנהל/ת מוצר"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">מחלקה</label><input type="text" id="j_dept" placeholder="טכנולוגיה"></div>
        <div class="form-group"><label class="form-label">תאריך פתיחה</label><input type="date" id="j_date"></div>
      </div>
      <div class="form-group"><label class="form-label">תיאור קצר</label><textarea id="j_desc" placeholder="תיאור התפקיד..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('addJobModal')">ביטול</button>
      <button class="btn btn-primary" onclick="saveJob()">שמור משרה</button>
    </div>
  </div>
</div>

<script>
// ============ DATA ============
const STAGES = ['קיבלנו','סינון','ראיון ראשון','ראיון מתקדם','הצעה','סגירה'];
const STAGE_CLS = ['badge-stage-0','badge-stage-1','badge-stage-2','badge-stage-3','badge-stage-4','badge-stage-5'];
const REJECTION_REASONS = ['לא מתאים ע"ס קו"ח','לא עבר סינון','נדחה לאחר ראיון ראשון','נדחה לאחר ראיון מתקדם','ציפיות שכר לא מתאימות','מועמד אחר נבחר','המשרה נסגרה','המועמד הסיר מועמדות','המועמד הבריז / לא הגיע','המועמד קיבל הצעה אחרת','המועמד חזר בו','אחר'];

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx84zvHwFHdSshdsj1N5f8K4GO_qDwIAmebFT-0beY4HIGuYeyQ-gT-xylKFjtGayDY/exec';

let jobs = [];
let nextJobId = 1;

let candidates = [];
let nextCandId = 1;
let _isLoading = false;

let _currentCandId = null;
let _currentInterviewIdx = null;
let _summaryStars = 0;
let _currentTab = 'dashboard';
let _detailTab = 'info';

// ============ GOOGLE SHEETS SYNC ============
async function loadFromSheets() {
  _isLoading = true;
  showLoadingOverlay();
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const data = await res.json();
    if (data.candidates && data.candidates.length > 0) {
      candidates = data.candidates.map(c => ({
        ...c,
        id: Number(c.id) || nextCandId++,
        fn: c.fn || c.firstName || '',
        ln: c.ln || c.lastName || '',
        stage: Number(c.stage) || 0,
        rejected: c.rejected === true || c.rejected === 'true',
        cvFile: null,
        cvFiles: Array.isArray(c.cvFiles) ? c.cvFiles : (c.cvName ? [{name:c.cvName, date:c.date||''}] : []),
        interviews: Array.isArray(c.interviews) ? c.interviews : [],
        log: Array.isArray(c.log) ? c.log : [],
      }));
      nextCandId = Math.max(...candidates.map(c=>c.id), 0) + 1;
    }
    if (data.jobs && data.jobs.length > 0) {
      jobs = data.jobs.map(j => ({...j, id: Number(j.id)}));
      nextJobId = Math.max(...jobs.map(j=>j.id), 0) + 1;
    }
  } catch(e) {
    toast('שגיאה בטעינה מ-Google Sheets — עובדת במצב לא מקוון');
  }
  _isLoading = false;
  hideLoadingOverlay();
  render();
}

async function syncCandidate(candidate) {
  const toSave = {
    ...candidate,
    firstName: candidate.fn || '',
    lastName: candidate.ln || '',
  };
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', candidate: toSave }),
    });
  } catch(e) {
    toast('⚠️ שגיאת שמירה — בדקי חיבור אינטרנט');
  }
}

async function syncJob(job) {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveJob', job }),
    });
  } catch(e) {
    toast('⚠️ שגיאת שמירה — בדקי חיבור אינטרנט');
  }
}

async function deleteJobFromSheets(id) {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteJob', id }),
    });
  } catch(e) {}
}

function showLoadingOverlay() {
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoadingOverlay() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ============ ROUTING ============
function goTab(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  _currentTab = el.dataset.tab;
  document.getElementById('pageTitle').textContent = el.textContent.trim();
  render();
}

function render(){
  const t = _currentTab;
  const c = document.getElementById('mainContent');
  if(t==='dashboard') c.innerHTML = renderDashboard();
  else if(t==='pipeline') c.innerHTML = renderPipeline();
  else if(t==='candidates') c.innerHTML = renderCandidates();
  else if(t==='jobs') c.innerHTML = renderJobs();
  else if(t==='email') c.innerHTML = renderEmail();
  else if(t==='reports') c.innerHTML = renderReports();
}

// ============ DASHBOARD ============
function renderDashboard(){
  const open = jobs.filter(j=>j.status==='פתוחה').length;
  const active = candidates.filter(c=>!c.rejected);
  const total = active.length;
  const inProgress = active.filter(c=>c.stage>0&&c.stage<5).length;
  const hired = active.filter(c=>c.stage===5).length;
  const rejected = candidates.filter(c=>c.rejected).length;
  const recent = [...candidates].sort((a,b)=>b.id-a.id).slice(0,5);
  const upcomingInterviews = [];
  active.forEach(c=>{c.interviews.forEach(iv=>{if(!iv.stars) upcomingInterviews.push({cand:c,iv})})});

  return `
<div class="stats-row">
  <div class="stat-card"><div class="stat-val">${open}</div><div class="stat-lbl">משרות פתוחות</div></div>
  <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">מועמדים פעילים</div></div>
  <div class="stat-card"><div class="stat-val">${hired}</div><div class="stat-lbl">גויסו</div></div>
  <div class="stat-card" style="border-color:#fecaca"><div class="stat-val" style="color:#991b1b">${rejected}</div><div class="stat-lbl">סיום תהליך</div></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div>
    <div class="card">
      <div class="card-head"><span class="card-title">פעילות אחרונה</span></div>
      <table class="tbl">
        <thead><tr><th>מועמד</th><th>משרה</th><th>שלב</th></tr></thead>
        <tbody>
          ${recent.map(c=>`<tr onclick="openCandidate(${c.id})">
            <td><strong>${c.fn} ${c.ln}</strong><br><span style="font-size:11px;color:#aaa">${c.date}</span></td>
            <td style="font-size:12px;color:#555">${c.job}</td>
            <td><span class="badge ${STAGE_CLS[c.stage]}">${STAGES[c.stage]}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div>
    <div class="card">
      <div class="card-head"><span class="card-title">ראיונות ממתינים לסיכום</span></div>
      <div class="card-body">
        ${upcomingInterviews.length===0?'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">כל הראיונות מסוכמים</div></div>':
        upcomingInterviews.map(({cand,iv})=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0efeb">
            <div>
              <div style="font-size:13px;font-weight:500">${cand.fn} ${cand.ln}</div>
              <div style="font-size:11px;color:#888">${iv.type} · ${iv.date} ${iv.time}</div>
            </div>
            <button class="btn btn-sm" onclick="openSummary(${cand.id},${cand.interviews.indexOf(iv)})">סכמי</button>
          </div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-top:0">
      <div class="card-head"><span class="card-title">התפלגות pipeline</span></div>
      <div class="card-body" style="padding:12px 18px">
        ${STAGES.map((s,i)=>{
          const n=candidates.filter(c=>c.stage===i).length;
          const pct = total>0?Math.round(n/total*100):0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:12px;color:#555;min-width:90px">${s}</span>
            <div style="flex:1;background:#f0efeb;border-radius:4px;height:8px;overflow:hidden">
              <div style="width:${pct}%;background:#6366f1;height:100%;border-radius:4px"></div>
            </div>
            <span style="font-size:12px;font-weight:500;min-width:20px">${n}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>
</div>`;
}

// ============ PIPELINE ============
function renderPipeline(){
  const rejectedList = candidates.filter(c=>c.rejected);
  return `<div class="pipeline-wrap">
    ${STAGES.map((s,i)=>{
      const cs = candidates.filter(c=>!c.rejected&&c.stage===i);
      return `<div class="pipe-col">
        <div class="pipe-col-head">${s}<span class="pipe-count">${cs.length}</span></div>
        ${cs.map(c=>`<div class="pipe-card" onclick="openCandidate(${c.id})">
          <div class="pipe-name">${c.fn} ${c.ln}</div>
          <div class="pipe-job">${c.job}</div>
        </div>`).join('')}
        ${cs.length===0?`<div style="font-size:11px;color:#ccc;text-align:center;padding:8px">אין מועמדים</div>`:''}
      </div>`;
    }).join('')}
    <div class="pipe-col pipe-col-rejected">
      <div class="pipe-col-head">❌ נדחו<span class="pipe-count">${rejectedList.length}</span></div>
      ${rejectedList.map(c=>`<div class="pipe-card pipe-card-rejected" onclick="openCandidate(${c.id})">
        <div class="pipe-name">${c.fn} ${c.ln}</div>
        <div class="pipe-job" style="color:#f87171;font-size:10px">${c.rejectionReason}</div>
      </div>`).join('')}
      ${rejectedList.length===0?`<div style="font-size:11px;color:#fca5a5;text-align:center;padding:8px">אין</div>`:''}
    </div>
  </div>
  <div style="font-size:12px;color:#aaa;text-align:center;margin-top:8px">לחצי על מועמד לפרטים ועדכון שלב</div>`;
}

// ============ CANDIDATES ============
function renderCandidates(){
  const search = document.getElementById('candSearch')?.value?.toLowerCase()||'';
  const showRej = document.getElementById('showRejected')?.checked;
  const filtered = candidates.filter(c=>
    (c.fn+' '+c.ln+' '+c.email+' '+c.job).toLowerCase().includes(search) &&
    (showRej || !c.rejected)
  );
  return `<div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
    <input type="text" id="candSearch" placeholder="חיפוש לפי שם, מייל, משרה..." style="max-width:280px" oninput="render()">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#555;cursor:pointer">
      <input type="checkbox" id="showRejected" onchange="render()"> הצגת מועמדים שסיימו תהליך
    </label>
    <span style="font-size:12px;color:#aaa;margin-right:auto">${filtered.length} מועמדים</span>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="tbl">
      <thead><tr><th>שם</th><th>משרה</th><th>שלב / סטטוס</th><th>מקור</th><th>קו"ח</th><th>תאריך</th><th></th></tr></thead>
      <tbody>
        ${filtered.map(c=>`<tr onclick="openCandidate(${c.id})" ${c.rejected?'style="opacity:0.7"':''}>
          <td>
            <strong>${c.fn} ${c.ln}</strong><br>
            <span style="font-size:11px;color:#aaa">${c.email}</span>
          </td>
          <td style="font-size:12px;color:#555">${c.job}</td>
          <td>${c.rejected?`<span class="badge badge-rejected">❌ ${c.rejectionReason}</span>`:`<span class="badge ${STAGE_CLS[c.stage]}">${STAGES[c.stage]}</span>`}</td>
          <td style="font-size:12px;color:#888">${c.source}</td>
          <td style="font-size:12px">${c.cvName?`📎 <span style="color:#3730a3">${c.cvName}</span>`:'<span style="color:#ccc">—</span>'}</td>
          <td style="font-size:12px;color:#aaa">${c.date}</td>
          <td onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openCandidate(${c.id})">פתח</button></td>
        </tr>`).join('')}
        ${filtered.length===0?`<tr><td colspan="7"><div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">לא נמצאו מועמדים</div></div></td></tr>`:''}
      </tbody>
    </table>
  </div>`;
}

// ============ CANDIDATE DETAIL ============
function openCandidate(id){
  _currentCandId = id;
  _detailTab = 'info';
  renderCandidateDetail();
  document.getElementById('candidateDetailModal').style.display='flex';
}

function renderCandidateDetail(){
  const c = candidates.find(x=>x.id===_currentCandId);
  if(!c) return;
  const initials = (c.fn[0]||'')+(c.ln[0]||'');
  const pendingIvs = c.interviews.filter(iv=>!iv.stars).length;
  document.getElementById('candidateDetailContent').innerHTML = `
    <div class="modal-head">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="${c.rejected?'background:#FEF2F2;color:#991b1b':''}">${initials}</div>
        <div>
          <div style="font-size:15px;font-weight:600">${c.fn} ${c.ln} ${c.rejected?'<span class="badge badge-rejected">נסגר תהליך</span>':''}</div>
          <div style="font-size:12px;color:#888">${c.job} · ${c.source}</div>
          ${c.rejected?`<div style="font-size:12px;color:#991b1b;margin-top:2px">סיבה: ${c.rejectionReason}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${!c.rejected?`<button class="btn btn-danger btn-sm" onclick="openReject(${c.id})">❌ סיים תהליך</button>`:`<button class="btn btn-sm" onclick="restoreCandidate(${c.id})">↩ החזר לתהליך</button>`}
        <button class="btn-ghost btn btn-sm" onclick="closeModal('candidateDetailModal')">✕</button>
      </div>
    </div>

    <!-- Stage selector -->
    ${!c.rejected?`<div style="padding:12px 20px;border-bottom:1px solid #e5e5e2;background:#fafaf8">
      <div style="font-size:11px;font-weight:600;color:#aaa;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">שלב נוכחי</div>
      <div class="stage-selector">
        ${STAGES.map((s,i)=>`<button class="stage-btn ${c.stage===i?'active':''}" onclick="updateStage(${c.id},${i})">${s}</button>`).join('')}
      </div>
    </div>`:`<div style="padding:10px 20px;border-bottom:1px solid #fecaca;background:#FEF2F2;font-size:13px;color:#991b1b">⛔ תהליך הסתיים בשלב <strong>${STAGES[c.stage]}</strong> — ${c.rejectionReason}${c.rejectionNotes?`<div style="font-size:12px;margin-top:2px">${c.rejectionNotes}</div>`:''}</div>`}

    <!-- Detail tabs -->
    <div class="detail-tabs">
      <div class="detail-tab ${_detailTab==='info'?'active':''}" onclick="switchDetailTab('info')">פרטים</div>
      <div class="detail-tab ${_detailTab==='interviews'?'active':''}" onclick="switchDetailTab('interviews')">ראיונות ${pendingIvs>0?`<span style="color:#dc2626">(${pendingIvs})</span>`:''}</div>
      <div class="detail-tab ${_detailTab==='log'?'active':''}" onclick="switchDetailTab('log')">לוג</div>
    </div>

    <div id="detailTabContent" style="max-height:400px;overflow-y:auto">
      ${renderDetailTab(c)}
    </div>
  `;
}

function renderDetailTab(c){
  if(_detailTab==='info') return renderDetailInfo(c);
  if(_detailTab==='interviews') return renderDetailInterviews(c);
  if(_detailTab==='log') return renderDetailLog(c);
  return '';
}

function renderDetailInfo(c){
  return `<div class="detail-section">
    <div class="detail-section-title">פרטי קשר</div>
    <div class="info-row"><span class="info-key">מייל:</span><span>${c.email||'—'}</span></div>
    <div class="info-row"><span class="info-key">טלפון:</span><span>${c.phone||'—'}</span></div>
    <div class="info-row"><span class="info-key">מקור:</span><span>${c.source}</span></div>
    <div class="info-row"><span class="info-key">נכנס:</span><span>${c.date}</span></div>
  </div>
  <div class="detail-section" style="border-top:1px solid #f0efeb">
    <div class="detail-section-title">קורות חיים</div>
    <div id="cvFilesList_${c.id}">
    ${(()=>{
      const files = (c.cvFiles&&c.cvFiles.length>0) ? c.cvFiles : (c.cvName?[{name:c.cvName,date:c.date}]:[]);
      return files.length>0
        ? files.map((f,i)=>`<div class="file-item"><span class="file-icon">📄</span><span class="file-name">${f.name||f}</span><span style="font-size:11px;color:#aaa;margin-right:4px">${f.date||''}</span><button class="btn btn-sm btn-danger" style="margin-right:auto;padding:2px 8px" onclick="removeCVFile(${c.id},${i})">הסר</button></div>`).join('')
        : `<div style="margin-bottom:8px;font-size:13px;color:#aaa">לא הועלה קובץ</div>`;
    })()}
    </div>
    <div class="file-zone" style="padding:10px;margin-top:6px" onclick="document.getElementById('det_cv_${c.id}').click()">
      <div style="font-size:13px;color:#888">📎 הוספת קובץ (PDF, DOC, DOCX)</div>
      <input type="file" id="det_cv_${c.id}" accept=".pdf,.doc,.docx" style="display:none" onchange="addCVFile(this,${c.id})">
    </div>
    <div id="det_cv_preview_${c.id}" style="margin-top:6px"></div>
  </div>
  <div class="detail-section" style="border-top:1px solid #f0efeb">
    <div class="detail-section-title">הערות</div>
    <textarea id="notesArea_${c.id}" style="width:100%;font-size:13px" rows="3">${c.notes}</textarea>
    <button class="btn btn-sm btn-primary" style="margin-top:6px" onclick="saveNotes(${c.id})">שמור הערות</button>
  </div>`;
}

function renderDetailInterviews(c){
  return `<div class="detail-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="detail-section-title" style="margin-bottom:0">ראיונות</div>
      <button class="btn btn-sm btn-primary" onclick="openAddInterview(${c.id})">+ הוסף ראיון</button>
    </div>
    ${c.interviews.length===0?`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">עוד לא נקבעו ראיונות</div></div>`:''}
    ${c.interviews.map((iv,idx)=>`
      <div class="interview-card">
        <div class="interview-head">
          <span class="interview-type">${iv.type}</span>
          <span class="interview-date">📅 ${iv.date} בשעה ${iv.time}</span>
        </div>
        ${iv.interviewer?`<div style="font-size:12px;color:#888;margin-bottom:6px">👤 ${iv.interviewer}</div>`:''}
        ${iv.prenotes?`<div style="font-size:12px;color:#555;margin-bottom:8px;padding:6px;background:#f5f4f1;border-radius:6px">📝 ${iv.prenotes}</div>`:''}
        ${iv.stars?`
          <div class="interview-score">${[1,2,3,4,5].map(s=>`<span class="${s<=iv.stars?'star':'star empty'}">${s<=iv.stars?'⭐':'☆'}</span>`).join('')}</div>
          <div class="interview-notes">${iv.summary}</div>
          ${iv.rec?`<div style="font-size:12px;margin-top:6px">${iv.rec}</div>`:''}
        `:`<button class="btn btn-sm" style="margin-top:4px" onclick="openSummary(${c.id},${idx})">✍️ הוסף סיכום</button>`}
      </div>
    `).join('')}
  </div>`;
}

function renderDetailLog(c){
  return `<div class="detail-section">
    <div class="detail-section-title">היסטוריית פעולות</div>
    <div style="margin-bottom:12px">
      ${c.log.slice().reverse().map(l=>`<div class="log-item"><span class="log-date">${l.date}</span><span class="log-text">${l.text}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">

    </div>

function switchDetailTab(tab){
  _detailTab = tab;
  const c = candidates.find(x=>x.id===_currentCandId);
  document.getElementById('candidateDetailContent').querySelector('.detail-tabs').querySelectorAll('.detail-tab').forEach((t,i)=>{
    t.classList.toggle('active',['info','interviews','log'][i]===tab);
  });
  document.getElementById('detailTabContent').innerHTML = renderDetailTab(c);
}

function updateStage(id, stage){
  const c = candidates.find(x=>x.id===id);
  c.stage = stage;
  const d = todayStr();
  c.log.push({date:d,text:'שלב עודכן: '+STAGES[stage]});
  syncCandidate(c);
  renderCandidateDetail();
  toast('שלב עודכן ונשמר ☁️');
}

function openReject(id){
  _currentCandId = id;
  const c = candidates.find(x=>x.id===id);
  document.getElementById('rejectCandName').textContent = c.fn+' '+c.ln;
  document.getElementById('rej_reason').value = '';
  document.getElementById('rej_notes').value = '';
  document.getElementById('rej_other').value = '';
  document.getElementById('rej_other_wrap').style.display='none';
  document.getElementById('rej_reason').onchange = function(){
    document.getElementById('rej_other_wrap').style.display = this.value==='אחר'?'block':'none';
  };
  document.getElementById('rejectModal').style.display='flex';
}

function saveRejection(){
  const reason = document.getElementById('rej_reason').value;
  if(!reason){alert('אנא בחרי סיבה');return;}
  const finalReason = reason==='אחר'?document.getElementById('rej_other').value||'אחר':reason;
  const c = candidates.find(x=>x.id===_currentCandId);
  c.rejected = true;
  c.rejectionReason = finalReason;
  c.rejectionNotes = document.getElementById('rej_notes').value.trim();
  c.log.push({date:todayStr(),text:'תהליך הסתיים: '+finalReason});
  syncCandidate(c);
  closeModal('rejectModal');
  renderCandidateDetail();
  toast('תהליך סומן כסגור ונשמר ☁️');
}

function restoreCandidate(id){
  const c = candidates.find(x=>x.id===id);
  c.rejected = false;
  c.rejectionReason = '';
  c.rejectionNotes = '';
  c.log.push({date:todayStr(),text:'המועמד הוחזר לתהליך פעיל'});
  syncCandidate(c);
  renderCandidateDetail();
  toast('המועמד הוחזר לתהליך ונשמר ☁️');
}

function updateNotes(id, val){
  const c = candidates.find(x=>x.id===id);
  c.notes = val;
  syncCandidate(c);
}

function saveNotes(id){
  const el = document.getElementById('notesArea_'+id);
  if(!el) return;
  const c = candidates.find(x=>x.id===id);
  c.notes = el.value;
  syncCandidate(c);
  toast('הערות נשמרו ☁️');
}

function addLog(id){
  const inp = document.getElementById('newLogInput');
  if(!inp||!inp.value.trim()) return;
  const c = candidates.find(x=>x.id===id);
  c.log.push({date:todayStr(),text:inp.value.trim()});
  syncCandidate(c);
  switchDetailTab('log');
}

function openAddInterview(candId){
  _currentCandId = candId;
  document.getElementById('iv_date').value = '';
  document.getElementById('iv_time').value = '';

}

function saveInterview(){
  const c = candidates.find(x=>x.id===_currentCandId);
  const d = document.getElementById('iv_date').value;
  const t = document.getElementById('iv_time').value;
  if(!d||!t){alert('אנא מלאי תאריך ושעה');return;}

    prenotes:document.getElementById('iv_prenotes').value,

  });

  syncCandidate(c);
  closeModal('addInterview');
  renderCandidateDetail();
  _detailTab = 'interviews';
  switchDetailTab('interviews');
  toast('ראיון נשמר ☁️');

function openSummary(candId, ivIdx){
  _currentCandId = candId;
  _currentInterviewIdx = ivIdx;
  _summaryStars = 0;
  const c = candidates.find(x=>x.id===candId);
  const iv = c.interviews[ivIdx];
  document.getElementById('summaryInterviewLabel').textContent = `${iv.type} · ${iv.date} ${iv.time}${iv.interviewer?' · '+iv.interviewer:''}`;
  document.getElementById('sum_notes').value = iv.summary||'';
  document.getElementById('sum_rec').value = iv.rec||'';
  setStars(iv.stars||0);
  openModal('addSummary');

function setStars(n){
  _summaryStars = n;
  document.getElementById('starVal').textContent = n>0?['','⭐ גרוע','⭐⭐ בסדר','⭐⭐⭐ טוב','⭐⭐⭐⭐ מצוין','⭐⭐⭐⭐⭐ מושלם'][n]:'';
  document.querySelectorAll('.star-btn').forEach(s=>{
    s.style.opacity = parseInt(s.dataset.v)<=n?'1':'0.3';
  });
}

function saveSummary(){
  const c = candidates.find(x=>x.id===_currentCandId);
  const iv = c.interviews[_currentInterviewIdx];
  iv.stars = _summaryStars;
  iv.summary = document.getElementById('sum_notes').value;
  iv.rec = document.getElementById('sum_rec').value;
  c.log.push({date:todayStr(),text:`סוכם ראיון: ${iv.type} — ${iv.rec||'ללא המלצה'}`});
  syncCandidate(c);
  closeModal('addSummary');
  renderCandidateDetail();
  _detailTab = 'interviews';
  switchDetailTab('interviews');
  toast('סיכום נשמר ☁️');
}

function toggleJobStatus(id){
  const j = jobs.find(x=>x.id===id);
  j.status = j.status==='פתוחה'?'בהמתנה':'פתוחה';
  syncJob(j);
  render();
  toast('סטטוס המשרה עודכן ונשמר ☁️');
}

function deleteJob(id){
  const j = jobs.find(x=>x.id===id);
  const count = candidates.filter(c=>c.job===j.title).length;
  const msg = count>0
    ? `למשרה "${j.title}" יש ${count} מועמדים. המחיקה תסיר רק את המשרה — המועמדים יישארו. להמשיך?`
    : `למחוק את המשרה "${j.title}"?`;
  if(!confirm(msg)) return;
  deleteJobFromSheets(id);
  jobs = jobs.filter(x=>x.id!==id);
  render();
  toast('המשרה נמחקה');
}

function saveJob(){
  const title = document.getElementById('j_title').value.trim();
  if(!title){alert('אנא הזיני כותרת משרה');return;}
  const newJob = {id:nextJobId++,title,dept:document.getElementById('j_dept').value,status:'פתוחה',date:document.getElementById('j_date').value||todayStr().split('/').reverse().join('-'),desc:document.getElementById('j_desc').value};
  jobs.push(newJob);
  syncJob(newJob);
  closeModal('addJobModal');
  render();
  toast('משרה חדשה נוספה ונשמרה ☁️');
}

let _cvFile = null;
let _cvBase64 = null;

function handleCVFileSelect(input){
  const file = input.files[0];
  if(!file) return;
  _cvFile = file;
  document.getElementById('cvFileName').innerHTML = `<div class="file-item"><span class="file-icon">📄</span><span class="file-name">${file.name}</span><span class="file-size">${(file.size/1024).toFixed(0)}KB</span></div>`;
  document.getElementById('cvParseBtn').style.display = 'inline-flex';
  document.getElementById('cvParseResult').innerHTML = '';
  document.getElementById('cvParseStatus').innerHTML = '';

  const reader = new FileReader();
  reader.onload = e => { _cvBase64 = e.target.result.split(',')[1]; };
  reader.readAsDataURL(file);
}

async function parseCV(){
  if(!_cvFile || !_cvBase64){ alert('אנא בחרי קובץ קודם'); return; }

  const btn = document.getElementById('cvParseBtn');
  const status = document.getElementById('cvParseStatus');
  const result = document.getElementById('cvParseResult');
  btn.disabled = true;
  btn.textContent = '⏳ קוראת קורות חיים...';
  status.innerHTML = '<div style="font-size:13px;color:#3730a3">⏳ הבינה המלאכותית קוראת את קורות החיים, רגע...</div>';
  result.innerHTML = '';

  const mediaType = 'application/pdf';

  const prompt = `קרא את קורות החיים המצורפים וחלץ את הפרטים הבאים בדיוק בפורמט JSON זה בלבד, ללא טקסט נוסף:
{
  "firstName": "שם פרטי",
  "lastName": "שם משפחה",
  "email": "מייל",
  "phone": "טלפון",
  "experience": "תיאור קצר של הניסיון המקצועי (2-3 משפטים)",
  "education": "השכלה (תואר, מוסד)",
  "skills": "כישורים עיקריים מופרדים בפסיקים",
  "currentRole": "תפקיד נוכחי או אחרון"
}
אם שדה לא קיים, השאר אותו כמחרוזת ריקה.`;

  try {
    const messages = [
      { role: 'user', content: [
        { type: 'document', source: { type: 'base64', media_type: mediaType, data: _cvBase64 }},
        { type: 'text', text: prompt }
      ]}
    ];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages
      })
    });

    const data = await res.json();
    console.log('API response:', JSON.stringify(data));
    if(data.error) throw new Error('API error: ' + data.error.message + ' / type: ' + data.error.type);
    const text = data.content?.map(b => b.text||'').join('') || '';
    console.log('text:', text);
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    status.innerHTML = '';
    btn.disabled = false;
    btn.textContent = '✨ חלץ פרטים עם AI';

    const job = document.getElementById('cvJobSelect').value;
    result.innerHTML = `<div class="parsed-box">
      <div style="font-size:13px;font-weight:600;color:#065f46;margin-bottom:12px">✅ פרטים שזוהו — עברי ותקני אם נדרש</div>
      <div class="parsed-field"><span class="parsed-key">שם פרטי:</span><input type="text" id="p_fn" value="${parsed.firstName||''}" style="flex:1;padding:4px 8px;font-size:13px"></div>
      <div class="parsed-field"><span class="parsed-key">שם משפחה:</span><input type="text" id="p_ln" value="${parsed.lastName||''}" style="flex:1;padding:4px 8px;font-size:13px"></div>
      <div class="parsed-field"><span class="parsed-key">מייל:</span><input type="email" id="p_email" value="${parsed.email||''}" style="flex:1;padding:4px 8px;font-size:13px"></div>
      <div class="parsed-field"><span class="parsed-key">טלפון:</span><input type="text" id="p_phone" value="${parsed.phone||''}" style="flex:1;padding:4px 8px;font-size:13px"></div>
      ${parsed.currentRole?`<div class="parsed-field"><span class="parsed-key">תפקיד:</span><span style="font-size:13px">${parsed.currentRole}</span></div>`:''}
      ${parsed.experience?`<div style="margin:8px 0;font-size:12px;color:#065f46;font-weight:500">ניסיון:</div><div style="font-size:12px;color:#1a1a1a;background:#f5f5f0;padding:8px;border-radius:6px;margin-bottom:8px">${parsed.experience}</div>`:''}
      ${parsed.education?`<div style="margin:8px 0;font-size:12px;color:#065f46;font-weight:500">השכלה:</div><div style="font-size:12px;color:#1a1a1a;margin-bottom:8px">${parsed.education}</div>`:''}
      ${parsed.skills?`<div style="margin:8px 0;font-size:12px;color:#065f46;font-weight:500">כישורים:</div><div style="font-size:12px;color:#1a1a1a;margin-bottom:8px">${parsed.skills}</div>`:''}
      <div style="margin-top:14px">
        <button class="btn btn-primary btn-sm" onclick="importParsedCV('${job}','${_cvFile.name}',${JSON.stringify(parsed).replace(/'/g,"&#39;")})">👤 ייבא כמועמד חדש</button>
      </div>
    </div>`;

  } catch(err) {
    status.innerHTML = '';
    btn.disabled = false;
    btn.textContent = '✨ חלץ פרטים עם AI';
    result.innerHTML = `<div style="background:#FEF2F2;border:1px solid #fecaca;border-radius:8px;padding:12px;font-size:13px;color:#991b1b">
      שגיאה: ${err.message || err.toString()}
    </div>`;
  }
}

function importParsedCV(job, cvName, parsed){
  if(typeof parsed === 'string') { try { parsed = JSON.parse(parsed); } catch(e) { parsed = {}; } }
  const fn = document.getElementById('p_fn')?.value.trim() || parsed.firstName || '';
  const ln = document.getElementById('p_ln')?.value.trim() || parsed.lastName || '';
  const email = document.getElementById('p_email')?.value.trim() || parsed.email || '';
  const phone = document.getElementById('p_phone')?.value.trim() || parsed.phone || '';
  if(!fn){ alert('אנא ודאי שיש לפחות שם פרטי'); return; }

  const notes = [
    parsed.currentRole ? `תפקיד: ${parsed.currentRole}` : '',
    parsed.experience ? `ניסיון: ${parsed.experience}` : '',
    parsed.education ? `השכלה: ${parsed.education}` : '',
    parsed.skills ? `כישורים: ${parsed.skills}` : '',
  ].filter(Boolean).join('\n');

  const newC = {
    id: nextCandId++, fn, ln, email, phone,
    job: job||'לא ידוע', stage: 0, source: 'מייל',
    notes, date: todayStr(), cvFile: null, cvName: cvName||null,
    interviews: [], rejected: false, rejectionReason: '', rejectionNotes: '',
    log: [{date: todayStr(), text: 'קורות חיים נקלטו ועובדו ע"י AI'}]
  };
  candidates.push(newC);
  syncCandidate(newC);
  document.getElementById('cvParseResult').innerHTML = `<div style="background:#F0FDF4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px;color:#065f46">
    ✅ ${fn} ${ln} נוסף/ה בהצלחה ונשמר ☁️ — <a href="#" onclick="goTabByName('candidates');return false" style="color:#3730a3;font-weight:500">עברי למועמדים</a>
  </div>`;
  _cvFile = null; _cvBase64 = null;
  document.getElementById('cvUploadFile').value = '';
  document.getElementById('cvFileName').innerHTML = '';
  document.getElementById('cvParseBtn').style.display = 'none';
  toast('מועמד נוסף ונשמר ☁️');
}

// ============ REPORTS ============
function renderReports(){
  const active = candidates.filter(c=>!c.rejected);
  const rejected = candidates.filter(c=>c.rejected);
  const total = candidates.length;
  const byStage = STAGES.map((s,i)=>({stage:s,count:active.filter(c=>c.stage===i).length}));
  const bySource = {};
  candidates.forEach(c=>{bySource[c.source]=(bySource[c.source]||0)+1});
  const byRejReason = {};
  rejected.forEach(c=>{byRejReason[c.rejectionReason]=(byRejReason[c.rejectionReason]||0)+1});
  const conversion = total>0?Math.round(active.filter(c=>c.stage>=4).length/total*100):0;

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-head"><span class="card-title">מועמדים פעילים לפי שלב</span></div>
      <div class="card-body">
        ${byStage.map(({stage,count})=>{
          const pct=active.length>0?Math.round(count/active.length*100):0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:12px;min-width:90px;color:#555">${stage}</span>
            <div style="flex:1;background:#f0efeb;border-radius:4px;height:10px;overflow:hidden">
              <div style="width:${pct}%;background:#6366f1;height:100%;border-radius:4px;transition:width .3s"></div>
            </div>
            <span style="font-size:12px;font-weight:500;min-width:16px">${count}</span>
            <span style="font-size:11px;color:#aaa;min-width:28px">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">מקורות גיוס</span></div>
      <div class="card-body">
        ${Object.entries(bySource).sort((a,b)=>b[1]-a[1]).map(([src,n])=>{
          const pct=total>0?Math.round(n/total*100):0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:12px;min-width:90px;color:#555">${src}</span>
            <div style="flex:1;background:#f0efeb;border-radius:4px;height:10px;overflow:hidden">
              <div style="width:${pct}%;background:#10b981;height:100%;border-radius:4px"></div>
            </div>
            <span style="font-size:12px;font-weight:500">${n}</span>
            <span style="font-size:11px;color:#aaa;min-width:28px">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title" style="color:#991b1b">❌ סיבות סיום תהליך (${rejected.length})</span></div>
      <div class="card-body">
        ${rejected.length===0?`<div class="empty"><div class="empty-icon" style="font-size:24px">✅</div><div class="empty-text">אין מועמדים שסיימו תהליך</div></div>`:''}
        ${Object.entries(byRejReason).sort((a,b)=>b[1]-a[1]).map(([reason,n])=>{
          const pct=rejected.length>0?Math.round(n/rejected.length*100):0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:12px;color:#555;min-width:160px;line-height:1.3">${reason}</span>
            <div style="flex:1;background:#fee2e2;border-radius:4px;height:10px;overflow:hidden">
              <div style="width:${pct}%;background:#ef4444;height:100%;border-radius:4px"></div>
            </div>
            <span style="font-size:12px;font-weight:500">${n}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">מדדים מרכזיים</span></div>
      <div class="card-body">
        <div class="stat-card" style="margin-bottom:10px"><div class="stat-val">${total}</div><div class="stat-lbl">סה"כ מועמדים (כולל שסיימו)</div></div>
        <div class="stat-card" style="margin-bottom:10px"><div class="stat-val">${conversion}%</div><div class="stat-lbl">שיעור המרה להצעה+</div></div>
        <div class="stat-card" style="margin-bottom:10px"><div class="stat-val">${rejected.length}</div><div class="stat-lbl">סיום תהליך</div></div>
        <div class="stat-card"><div class="stat-val">${total>0?Math.round(rejected.length/total*100):0}%</div><div class="stat-lbl">שיעור נשירה כולל</div></div>
      </div>
    </div>
  </div>`;
}

// ============ ADD CANDIDATE ============
function openModal(name){
  if(name==='addCandidate'){
    const sel=document.getElementById('c_job');
    sel.innerHTML='<option value="">בחר/י משרה...</option>';
    jobs.filter(j=>j.status==='פתוחה').forEach(j=>{const o=document.createElement('option');o.value=j.title;o.textContent=j.title;sel.appendChild(o)});
    ['c_fn','c_ln','c_email','c_phone','c_notes'].forEach(id=>{document.getElementById(id).value=''});
    document.getElementById('c_cv_name').innerHTML='';
    document.getElementById('addCandidateModal').style.display='flex';
  } else if(name==='addJob'){
    ['j_title','j_dept','j_date','j_desc'].forEach(id=>{document.getElementById(id).value=''});
    document.getElementById('addJobModal').style.display='flex';
  } else if(name==='addInterview'){
    document.getElementById('addInterviewModal').style.display='flex';
  } else if(name==='addSummary'){
    document.getElementById('addSummaryModal').style.display='flex';
  }
}

function closeModal(id){
  const el = document.getElementById(id+'Modal')||document.getElementById(id);
  if(el) el.style.display='none';
  // ריענון המסך הראשי בסגירת כרטיס מועמד
  if(id==='candidateDetail') render();
}

function closeModalBg(e,id){
  if(e.target===e.currentTarget) closeModal(id);
}

function saveCandidate(){
  const fn=document.getElementById('c_fn').value.trim();
  const ln=document.getElementById('c_ln').value.trim();
  const job=document.getElementById('c_job').value;
  if(!fn||!ln){alert('אנא הזיני שם פרטי ושם משפחה');return;}
  if(!job){alert('אנא בחרי משרה');return;}
  const cvEl=document.getElementById('c_cv');
  const cvName=cvEl.files[0]?.name||null;
  const newC = {
    id:nextCandId++,fn,ln,
    email:document.getElementById('c_email').value.trim(),
    phone:document.getElementById('c_phone').value.trim(),
    job,source:document.getElementById('c_source').value,
    notes:document.getElementById('c_notes').value.trim(),
    date:todayStr(),cvFile:null,cvName,
    interviews:[],rejected:false,rejectionReason:'',rejectionNotes:'',
    log:[{date:todayStr(),text:'מועמד נוסף למערכת'}]
  };
  candidates.push(newC);
  syncCandidate(newC);
  closeModal('addCandidateModal');
  render();
  toast('מועמד חדש נוסף ונשמר ☁️');
}

// ============ FILE UPLOAD ============
function addCVFile(input, candId){
  const file = input.files[0];
  if(!file) return;
  const c = candidates.find(x=>x.id===candId);
  if(!c) return;
  if(!c.cvFiles) c.cvFiles = [];
  const entry = {name: file.name, date: todayStr()};
  c.cvFiles.push(entry);
  c.cvName = file.name; // תאימות לאחור
  c.log.push({date:todayStr(), text:'קובץ קורות חיים הוסף: '+file.name});
  syncCandidate(c);
  // עדכון תצוגה
  const list = document.getElementById('cvFilesList_'+candId);
  if(list){
    list.innerHTML = c.cvFiles.map((f,i)=>`<div class="file-item"><span class="file-icon">📄</span><span class="file-name">${f.name}</span><span style="font-size:11px;color:#aaa;margin-right:4px">${f.date||''}</span><button class="btn btn-sm btn-danger" style="margin-right:auto;padding:2px 8px" onclick="removeCVFile(${candId},${i})">הסר</button></div>`).join('');
  }
  toast('קובץ נוסף ונשמר ☁️');
}

function removeCVFile(candId, idx){
  const c = candidates.find(x=>x.id===candId);
  if(!c||!c.cvFiles) return;
  const name = c.cvFiles[idx]?.name||'';
  if(!confirm('להסיר את הקובץ "'+name+'"?')) return;
  c.cvFiles.splice(idx,1);
  c.cvName = c.cvFiles.length>0 ? c.cvFiles[c.cvFiles.length-1].name : '';
  c.log.push({date:todayStr(), text:'קובץ קורות חיים הוסר: '+name});
  syncCandidate(c);
  const list = document.getElementById('cvFilesList_'+candId);
  if(list){
    list.innerHTML = c.cvFiles.length>0
      ? c.cvFiles.map((f,i)=>`<div class="file-item"><span class="file-icon">📄</span><span class="file-name">${f.name}</span><span style="font-size:11px;color:#aaa;margin-right:4px">${f.date||''}</span><button class="btn btn-sm btn-danger" style="margin-right:auto;padding:2px 8px" onclick="removeCVFile(${candId},${i})">הסר</button></div>`).join('')
      : `<div style="font-size:13px;color:#aaa">לא הועלה קובץ</div>`;
  }
  toast('קובץ הוסר');
}

function handleCVUpload(input, previewId, updateCurrent){
  const file = input.files[0];
  if(!file) return;
  const el = document.getElementById(previewId);
  if(el) el.innerHTML=`<div class="file-item"><span class="file-icon">📄</span><span class="file-name">${file.name}</span><span class="file-size">${(file.size/1024).toFixed(0)}KB</span></div>`;
  if(updateCurrent&&_currentCandId){
    addCVFile(input, _currentCandId);
  }
}

// ============ UTILS ============
function todayStr(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function goTabByName(name){
  const el = document.querySelector(`[data-tab="${name}"]`);
  if(el) goTab(el);
}
